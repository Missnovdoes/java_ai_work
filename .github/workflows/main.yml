name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: 17
        distribution: temurin

    - name: Build and test with Maven
      working-directory: ./zhigou-backend
      run: mvn -B verify

    - name: Build Docker image
      working-directory: ./zhigou-backend
      run: docker build -t zhigou-backend:${{ github.sha }} .

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install and build
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
