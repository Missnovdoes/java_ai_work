server:
  port: 5000

spring:
  application:
    name: zhigou-backend

# Supabase 配置（通过环境变量注入）
supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}

# 豆包 AI 配置
doubao:
  api-key: ${DOUBAO_API_KEY}
  endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
  model: ${DOUBAO_MODEL:doubao-seed-code-preview-251028}
  temperature: 0.7
  max-tokens: 300

# 价格谈判参数
negotiation:
  cost-price-ratio: 0.7
  min-profit-ratio: 0.85
  max-rounds: 5
  step-decrease: 10

logging:
  level:
    com.zhigou: DEBUG
