server:
  port: 5000

spring:
  application:
    name: zhigou-backend

supabase:
  url: ${SUPABASE_URL:http://localhost:54321}
  key: ${SUPABASE_KEY:placeholder}

doubao:
  api-key: ${DOUBAO_API_KEY:placeholder}
  endpoint: ${DOUBAO_ENDPOINT:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
  model: ${DOUBAO_MODEL:doubao-seed-code-preview-251028}
  temperature: 0.7
  max-tokens: 300

negotiation:
  cost-price-ratio: 0.7
  min-profit-ratio: 0.85
  max-rounds: 5
  step-decrease: 10

logging:
  level:
    com.zhigou: DEBUG
