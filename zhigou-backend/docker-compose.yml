version: '3.8'

services:
  app:
    build: .
    container_name: zhigou
    ports:
      - "80:5000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
    restart: unless-stopped

  postgres:
    image: postgres:14
    container_name: zhigou-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - local

volumes:
  postgres_data:
