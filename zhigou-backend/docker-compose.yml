version: '3.8'

services:
  # 后端服务 (Spring Boot)
  backend:
    build: ./zhigou-backend
    container_name: zhigou-backend
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY}
    ports:
      - "5000:5000"
    networks:
      - app-network
    restart: unless-stopped

  # 前端服务
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - backend
    restart: unless-stopped

  # PostgreSQL数据库（可选，用于本地开发）
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
